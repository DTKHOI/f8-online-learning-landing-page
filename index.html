<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Home</title>
        <!-- Reset CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <!-- Font -->
        <link rel="stylesheet" href="./assets/fonts/stylesheet.css" />

        <!-- Styles CSS -->
        <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
    <body style="height: 10000px">
        <header class="header">
            <div class="main-content">
                <div class="header__menu">
                    <img
                        src="./assets/icon/Logo.svg"
                        alt="Besnik."
                        class="logo"
                    />

                    <nav class="nav">
                        <ul class="nav__list">
                            <li class="nav__item">
                                <a href="#!" class="nav__link nav__link--active"
                                    >Home</a
                                >
                            </li>
                            <li class="nav__item">
                                <a href="#!" class="nav__link">Features</a>
                            </li>
                            <li class="nav__item">
                                <a href="#!" class="nav__link">Pricing</a>
                            </li>
                            <li class="nav__item">
                                <a href="#!" class="nav__link">About</a>
                            </li>
                            <li class="nav__item">
                                <a href="#!" class="nav__link">Contact</a>
                            </li>
                        </ul>
                    </nav>

                    <div class="header__actions">
                        <a href="#!" class="header__sign-in">Sign in</a>
                        <a href="#!" class="header__sign-up btn--outline"
                            >Sign up</a
                        >
                    </div>
                </div>

                <section class="hero">
                    <div class="hero__content">
                        <p class="hero__label">😎 EASY LEAENING PLATFORM</p>
                        <h1 class="hero__heading">Words learner come here.</h1>
                        <p class="hero__desc">
                            Build skills with courses, certificates, and get
                            online knowledge from our world-class platform.
                        </p>

                        <div class="hero__actions">
                            <a href="#!" class="hero__btn btn">Get Started</a>
                            <button class="hero__watch">
                                <div class="hero__icon-container">
                                    <img
                                        src="./assets/icon/playback.svg"
                                        alt="play"
                                        class="hero__icon"
                                    />
                                </div>
                            </button>
                        </div>
                    </div>

                    <figure class="hero__media">
                        <img
                            src="./assets/img/student-haidog-3.png"
                            alt=""
                            class="hero__hero-image"
                        />

                        <div
                            class="hero__box-lable hero__course-label hero__course-label--wrap"
                        >
                            <div class="hero__book-icon"></div>
                            <p class="hero__card-title">Courses 1000+</p>
                        </div>

                        <div class="hero__box-lable hero__schedule-label">
                            <p class="hero__card-title">Schedules</p>
                            <div class="hero__prog-box">
                                <div
                                    class="hero__prog-bar hero__prog-bar--half"
                                ></div>
                                <div
                                    class="hero__prog-bar hero__prog-bar--quarter"
                                ></div>
                                <div
                                    class="hero__prog-bar hero__prog-bar--third"
                                ></div>
                            </div>
                            <div class="hero__separate-line"></div>
                        </div>

                        <div class="hero__box-lable hero__student-label">
                            <p class="hero__card-title hero__card-title--last">
                                Our Active Students
                            </p>
                            <div class="hero__row-avt">
                                <div class="hero__bg-avt hero__bg-avt--color1">
                                    <img
                                        src="./assets/img/student-1.png"
                                        alt=""
                                        class="hero__student-avt"
                                    />
                                </div>
                                <div class="hero__bg-avt hero__bg-avt--color2">
                                    <img
                                        src="./assets/img/student-2.png"
                                        alt=""
                                        class="hero__student-avt"
                                    />
                                </div>
                                <div class="hero__bg-avt hero__bg-avt--color3">
                                    <img
                                        src="./assets/img/student-3.png"
                                        alt=""
                                        class="hero__student-avt"
                                    />
                                </div>
                                <div class="hero__bg-avt hero__bg-avt--color4">
                                    <img
                                        src="./assets/img/student-4.png"
                                        alt=""
                                        class="hero__student-avt"
                                    />
                                </div>
                                <div class="hero__bg-avt">
                                    <span class="hero__text-avt">10K+</span>
                                </div>
                            </div>
                        </div>
                    </figure>
                </section>
            </div>
        </header>
    </body>
</html>
